# ============================================================
# PACR — Production Profile
# All values are injected via environment variables.
# ============================================================

# --- Database ---
spring.datasource.url=jdbc:mariadb://${DB_HOST:mariadb}:${DB_PORT:3306}/${DB_NAME:pacr}
spring.datasource.username=${DB_USERNAME:pacr}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- CORS ---
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost}

# --- Jackson ---
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false

# --- JWT ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:7200000}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# --- File Upload ---
app.upload-path=${UPLOAD_PATH:/app/uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- Strain ---
strain.k=120.0

# --- Frontend URL ---
app.frontend-url=https://pacr.app

# --- Strava OAuth ---
strava.client-id=${STRAVA_CLIENT_ID:}
strava.client-secret=${STRAVA_CLIENT_SECRET:}
strava.redirect-uri=${STRAVA_REDIRECT_URI:}
strava.frontend-url=${STRAVA_FRONTEND_URL:}

# --- Mail (Gmail SMTP) ---
spring.mail.host=${MAIL_HOST:smtp.office365.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:${spring.mail.username}}

# --- AI ---
pacr.ai.enabled=true
pacr.ai.model=${PACR_AI_MODEL:gpt-4o-mini}
pacr.ai.apiKey=${PACR_AI_API_KEY:}

# --- Logging (production: minimal) ---
logging.level.root=WARN
logging.level.com.trainingsplan=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
