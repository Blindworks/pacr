spring.datasource.url=jdbc:mariadb://localhost:3306/smart_trainingsplan
spring.datasource.username=smart_trainingsplan
spring.datasource.password=taxcRH51#
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# CORS configuration (handled by SecurityConfig)
app.cors.allowed-origins=http://localhost:4200,http://localhost:4201,http://192.168.1.100:4201

# Jackson configuration
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Strava OAuth
strava.client-id=${STRAVA_CLIENT_ID:}
strava.client-secret=${STRAVA_CLIENT_SECRET:}
strava.redirect-uri=${STRAVA_REDIRECT_URI:http://localhost:8080/api/strava/callback}
strava.frontend-url=${STRAVA_FRONTEND_URL:http://localhost:4200}

# COROS OAuth
coros.client-id=${COROS_CLIENT_ID:}
coros.client-secret=${COROS_CLIENT_SECRET:}
coros.redirect-uri=${COROS_REDIRECT_URI:http://localhost:8080/api/coros/callback}
coros.frontend-url=${COROS_FRONTEND_URL:http://localhost:4200}

# Yolanda Smart Scale OAuth
yolanda.client-id=${YOLANDA_CLIENT_ID:}
yolanda.client-secret=${YOLANDA_CLIENT_SECRET:}
yolanda.redirect-uri=${YOLANDA_REDIRECT_URI:http://localhost:8080/api/yolanda/callback}
yolanda.frontend-url=${YOLANDA_FRONTEND_URL:http://localhost:4200}

# COROS Webhook verification (provided by COROS after integration approval)
coros.webhook.client=${COROS_WEBHOOK_CLIENT:}
coros.webhook.secret=${COROS_WEBHOOK_SECRET:}

# JWT configuration
app.jwt.secret=${JWT_SECRET:SmartTrainingsplanSecretKeyThatIsAtLeast32CharactersLong2024!!}
app.jwt.expiration-ms=86400000

app.upload-path=${UPLOAD_PATH:/app/uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Strain calculation: compression constant k (rawLoad=k → strain21≈13.3)
strain.k=120.0

# Mail configuration (Gmail SMTP, can be changed later)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:${spring.mail.username}}

# App version (injected by Maven resource filtering)
app.version=@project.version@
app.build.timestamp=@maven.build.timestamp@

# Logging
logging.level.com.trainingsplan=DEBUG
logging.level.com.trainingsplan.security.JwtAuthenticationFilter=DEBUG

# PACR AI module toggle
pacr.ai.enabled=true
pacr.ai.model=${PACR_AI_MODEL:gpt-4o-mini}
pacr.ai.apiKey=${PACR_AI_API_KEY:}

