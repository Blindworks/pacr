<dialog #dialog class="apr-dialog" (click)="onBackdropClick($event)">
  <div class="apr-inner" (click)="$event.stopPropagation()">

    <header class="apr-header">
      <div class="apr-header-title">
        <span class="material-symbols-outlined apr-icon">emoji_events</span>
        <span>{{ 'DIALOGS.PR_ADD_TITLE' | translate }}</span>
      </div>
      <button class="apr-close" type="button" (click)="onCancel()" [attr.aria-label]="'COMMON.CLOSE' | translate">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <div class="apr-body">

      <!-- Distance select -->
      <div class="apr-field-group">
        <label class="apr-label" for="distanceSelect">{{ 'DIALOGS.PR_SELECT_DISTANCE' | translate }}</label>
        <div class="apr-select-wrapper">
          <select
            id="distanceSelect"
            class="apr-select"
            [(ngModel)]="selectedOption"
            [compareWith]="compareOptions"
          >
            <option [ngValue]="null" disabled hidden>{{ 'DIALOGS.PR_CHOOSE' | translate }}</option>
            <option *ngFor="let opt of distanceOptions" [ngValue]="opt">{{ opt.labelKey | translate }}</option>
          </select>
          <span class="material-symbols-outlined apr-select-icon">expand_more</span>
        </div>
      </div>

      <!-- Custom distance fields -->
      <div class="apr-custom-row" *ngIf="isCustomDistance">
        <div class="apr-field-group">
          <label class="apr-label" for="customKm">{{ 'DIALOGS.PR_DISTANCE_KM' | translate }}</label>
          <input
            id="customKm"
            class="apr-input"
            type="number"
            inputmode="decimal"
            min="0.1"
            step="0.1"
            [placeholder]="'DIALOGS.PR_DISTANCE_PLACEHOLDER' | translate"
            [(ngModel)]="customDistanceKm"
          />
        </div>
        <div class="apr-field-group">
          <label class="apr-label" for="customLabel">{{ 'DIALOGS.PR_LABEL' | translate }}</label>
          <input
            id="customLabel"
            class="apr-input"
            type="text"
            [placeholder]="'DIALOGS.PR_LABEL_PLACEHOLDER' | translate"
            [(ngModel)]="customDistanceLabel"
          />
        </div>
      </div>

      <!-- Goal time (optional) -->
      <div class="apr-field-group">
        <label class="apr-label" for="goalTime">{{ 'DIALOGS.PR_TARGET_TIME' | translate }}</label>
        <input
          id="goalTime"
          class="apr-input"
          type="text"
          inputmode="numeric"
          [placeholder]="'DIALOGS.PR_TIME_PLACEHOLDER' | translate"
          [(ngModel)]="goalTimeInput"
        />
        <span class="apr-hint">{{ 'DIALOGS.PR_TIME_FORMAT' | translate }}</span>
      </div>

      <!-- Error message -->
      <p class="apr-error" *ngIf="error">{{ error }}</p>

    </div>

    <footer class="apr-actions">
      <button class="apr-btn apr-btn--ghost" type="button" (click)="onCancel()">
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        class="apr-btn apr-btn--primary"
        type="button"
        [disabled]="!canSave || saving"
        (click)="onSave()"
      >
        <span *ngIf="!saving">{{ 'COMMON.SAVE' | translate }}</span>
        <span *ngIf="saving">{{ 'COMMON.SAVING' | translate }}</span>
      </button>
    </footer>

  </div>
</dialog>
