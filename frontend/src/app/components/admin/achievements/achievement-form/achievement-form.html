<div class="form-page">
  <div class="form-header">
    <h2>{{ editId() ? ('ADMIN.EDIT_ACHIEVEMENT' | translate) : ('ADMIN.NEW_ACHIEVEMENT_TITLE' | translate) }}</h2>
  </div>

  <form class="form-body" (ngSubmit)="save()">
    <div class="field-row">
      <div class="field">
        <label for="key">{{ 'ADMIN.KEY' | translate }}</label>
        <input id="key" type="text" [ngModel]="key()" (ngModelChange)="key.set($event)"
               name="key" [placeholder]="'ADMIN.KEY_PLACEHOLDER' | translate" [disabled]="editId() !== null" />
      </div>
      <div class="field">
        <label for="sortOrder">{{ 'ADMIN.SORT_ORDER' | translate }}</label>
        <input id="sortOrder" type="number" [ngModel]="sortOrder()" (ngModelChange)="sortOrder.set($event)"
               name="sortOrder" />
      </div>
    </div>

    <div class="field">
      <label for="name">{{ 'ADMIN.ACHIEVEMENT_NAME' | translate }}</label>
      <input id="name" type="text" [ngModel]="name()" (ngModelChange)="name.set($event)"
             name="name" [placeholder]="'ADMIN.ACHIEVEMENT_NAME' | translate" />
    </div>

    <div class="field">
      <label for="description">{{ 'COMMON.DESCRIPTION' | translate }}</label>
      <textarea id="description" [ngModel]="description()" (ngModelChange)="description.set($event)"
                name="description" rows="3" [placeholder]="'ADMIN.ACHIEVEMENT_DESC' | translate"></textarea>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="category">{{ 'ADMIN.CATEGORY' | translate }}</label>
        <select id="category" [ngModel]="category()" (ngModelChange)="category.set($event)" name="category">
          @for (cat of categories; track cat.value) {
            <option [value]="cat.value">{{ cat.label }}</option>
          }
        </select>
      </div>
      <div class="field">
        <label for="threshold">{{ 'ADMIN.THRESHOLD_VALUE' | translate }}</label>
        <input id="threshold" type="number" [ngModel]="threshold()" (ngModelChange)="threshold.set($event)"
               name="threshold" step="any" />
      </div>
    </div>

    <div class="field">
      <label>{{ 'ADMIN.ICON' | translate }}</label>
      <div class="icon-picker">
        @for (ic of icons; track ic) {
          <button type="button" class="icon-option" [class.selected]="icon() === ic" (click)="icon.set(ic)">
            <span class="material-symbols-outlined">{{ ic }}</span>
          </button>
        }
      </div>
      <input type="text" [ngModel]="icon()" (ngModelChange)="icon.set($event)"
             name="icon" [placeholder]="'ADMIN.OR_MATERIAL_ICON' | translate" class="icon-input" />
    </div>

    <fieldset class="time-bound-section">
      <legend>{{ 'ADMIN.TIME_BOUND' | translate }}</legend>
      <div class="field-row">
        <div class="field">
          <label for="validFrom">{{ 'ADMIN.VALID_FROM' | translate }}</label>
          <input id="validFrom" type="date" [ngModel]="validFrom()" (ngModelChange)="validFrom.set($event)"
                 name="validFrom" />
        </div>
        <div class="field">
          <label for="validUntil">{{ 'ADMIN.VALID_UNTIL' | translate }}</label>
          <input id="validUntil" type="date" [ngModel]="validUntil()" (ngModelChange)="validUntil.set($event)"
                 name="validUntil" />
        </div>
      </div>
      <p class="hint">{{ 'ADMIN.PERMANENT_HINT' | translate }}</p>
    </fieldset>

    @if (error()) {
      <p class="form-error">{{ error() }}</p>
    }

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="saving()">
        {{ saving() ? ('COMMON.SAVING' | translate) : ('COMMON.SAVE' | translate) }}
      </button>
      <button type="button" class="btn-secondary" (click)="cancel()">{{ 'COMMON.CANCEL' | translate }}</button>
    </div>
  </form>
</div>
