<div class="form-page">
  <div class="form-header">
    <h2>{{ newsId() ? ('ADMIN.EDIT_NEWS_TITLE' | translate) : ('ADMIN.NEW_NEWS_TITLE' | translate) }}</h2>
  </div>

  <form class="form-body" (ngSubmit)="save()">
    <div class="field">
      <label for="title">{{ 'ADMIN.NEWS_TITLE_LABEL' | translate }}</label>
      <input id="title" type="text" [ngModel]="title()" (ngModelChange)="title.set($event)"
             name="title" [placeholder]="'ADMIN.NEWS_TITLE_PLACEHOLDER' | translate" />
    </div>

    <div class="field">
      <label for="content">{{ 'ADMIN.NEWS_CONTENT' | translate }}</label>
      <textarea id="content" [ngModel]="content()" (ngModelChange)="content.set($event)"
                name="content" rows="8" [placeholder]="'ADMIN.NEWS_CONTENT_PLACEHOLDER' | translate"></textarea>
    </div>

    <div class="field">
      <label for="excerpt">{{ 'ADMIN.NEWS_EXCERPT' | translate }}</label>
      <textarea id="excerpt" [ngModel]="excerpt()" (ngModelChange)="excerpt.set($event)"
                name="excerpt" rows="2" maxlength="500"
                [placeholder]="'ADMIN.NEWS_EXCERPT_PLACEHOLDER' | translate"></textarea>
    </div>

    <div class="field">
      <label for="topicTag">{{ 'ADMIN.NEWS_TOPIC_TAG' | translate }}</label>
      <input id="topicTag" type="text" [ngModel]="topicTag()" (ngModelChange)="topicTag.set($event)"
             name="topicTag" maxlength="64"
             [placeholder]="'ADMIN.NEWS_TOPIC_TAG_PLACEHOLDER' | translate" />
    </div>

    <div class="field">
      <label for="heroImage">{{ 'ADMIN.NEWS_HERO_IMAGE' | translate }}</label>
      <input id="heroImage" type="text" [ngModel]="heroImageFilename()" (ngModelChange)="heroImageFilename.set($event)"
             name="heroImage"
             [placeholder]="'ADMIN.NEWS_HERO_IMAGE_PLACEHOLDER' | translate" />
    </div>

    <div class="field field--inline">
      <label>
        <input type="checkbox" [ngModel]="isFeatured()" (ngModelChange)="isFeatured.set($event)" name="isFeatured" />
        <span>{{ 'ADMIN.NEWS_FEATURED' | translate }}</span>
      </label>
    </div>

    @if (error()) {
      <p class="form-error">{{ error() }}</p>
    }

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="saving()">
        {{ saving() ? ('COMMON.SAVING' | translate) : ('COMMON.SAVE' | translate) }}
      </button>
      <button type="button" class="btn-secondary" (click)="cancel()">{{ 'COMMON.CANCEL' | translate }}</button>
    </div>
  </form>
</div>
