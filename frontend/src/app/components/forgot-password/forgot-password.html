<div class="forgot-page">
  <div class="bg-overlay"></div>

  <div class="forgot-container">
    <div class="logo-section">
      <img src="assets/logo/PACR_logo_dark_text_transparent_cut.png" alt="PACR Logo" class="brand-logo" />
    </div>

    <div class="glass-panel">
      <div class="hero-image"></div>

      <div class="panel-body">
        <div class="panel-header">
          <h2>{{ 'FORGOT_PASSWORD.TITLE' | translate }}</h2>
          <p>{{ 'FORGOT_PASSWORD.SUBTITLE' | translate }}</p>
        </div>

        <form (ngSubmit)="onSubmit()" class="forgot-form">
          <div class="field-group">
            <label>{{ 'FORGOT_PASSWORD.EMAIL_LABEL' | translate }}</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">mail</span>
              <input
                type="email"
                [(ngModel)]="email"
                name="email"
                placeholder="e.g. runner@pacr.app"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn-submit">
            <span>{{ 'FORGOT_PASSWORD.SEND_LINK' | translate }}</span>
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </form>

        <div class="back-link-row">
          <a routerLink="/login" class="back-link">
            <span class="material-symbols-outlined">arrow_back</span>
            {{ 'FORGOT_PASSWORD.BACK_TO_LOGIN' | translate }}
          </a>
        </div>
      </div>
    </div>

    <footer class="forgot-footer">
      <a href="#">{{ 'LOGIN.TERMS' | translate }}</a>
      <a href="#">{{ 'LOGIN.PRIVACY' | translate }}</a>
      <a href="#">{{ 'LOGIN.SUPPORT' | translate }}</a>
    </footer>
  </div>
</div>
