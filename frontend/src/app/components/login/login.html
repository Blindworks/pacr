<div class="login-page">
  <div class="bg-overlay"></div>

  <div class="login-container">
    <div class="logo-section">
      <div class="logo-icon">
        <span class="material-symbols-outlined">bolt</span>
      </div>
      <h1 class="brand-name">PACR</h1>
    </div>

    <div class="glass-panel">
      <div class="panel-header">
        <h2>Welcome Back</h2>
        <p>Push your limits. Track your progress.</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="field-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">mail</span>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="runner@example.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="field-group">
          <div class="label-row">
            <label>Password</label>
            <a routerLink="/forgot-password" class="forgot-link">Forgot?</a>
          </div>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">lock</span>
            <input
              type="password"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>
        </div>

        <button type="submit" class="btn-login">LOG IN</button>
      </form>

      <div class="divider">
        <span>Connect With</span>
      </div>

      <div class="social-grid">
        <button type="button" class="social-btn" title="Garmin">
          <span class="material-symbols-outlined">watch</span>
        </button>
        <button type="button" class="social-btn" title="Strava">
          <span class="material-symbols-outlined">conversion_path</span>
        </button>
        <button type="button" class="social-btn" title="Google">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <p class="signup-text">
        Don't have an account? <a routerLink="/signup" class="signup-link">Sign Up</a>
      </p>
    </div>

    <footer class="login-footer">
      <a href="#">Terms</a>
      <a href="#">Privacy</a>
      <a href="#">Support</a>
    </footer>
  </div>
</div>
