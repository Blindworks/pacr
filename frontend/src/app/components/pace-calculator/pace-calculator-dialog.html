<dialog #dialog class="pace-dialog" (click)="onBackdropClick($event)">
  <div class="pace-inner" (click)="$event.stopPropagation()">

    <header class="pace-header">
      <div class="pace-header-title">
        <span class="material-symbols-outlined pace-icon">speed</span>
        <span>{{ 'DIALOGS.PACE_TITLE' | translate }}</span>
      </div>
      <button class="pace-close" (click)="close()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <div class="pace-body">

      <div class="pace-intro">
        <h2>{{ 'DIALOGS.PACE_SUBTITLE' | translate }}</h2>
        <p>{{ 'DIALOGS.PACE_DESCRIPTION' | translate }}</p>
      </div>

      <!-- Race presets -->
      <div class="presets-section">
        <span class="presets-label">{{ 'DIALOGS.PACE_PRESETS' | translate }}</span>
        <div class="presets">
          <button class="preset-btn" (click)="setPreset(5)">5K</button>
          <button class="preset-btn" (click)="setPreset(10)">10K</button>
          <button class="preset-btn" (click)="setPreset(21.0975)">{{ 'DIALOGS.PACE_HALF' | translate }}</button>
          <button class="preset-btn" (click)="setPreset(42.195)">{{ 'DIALOGS.PACE_FULL' | translate }}</button>
        </div>
      </div>

      <!-- Input fields -->
      <div class="fields-grid">
        <div class="field-card">
          <label class="field-label">{{ 'DIALOGS.PACE_DISTANCE' | translate }}</label>
          <input
            class="field-input"
            type="text"
            inputmode="decimal"
            placeholder="00.00"
            [(ngModel)]="distanceDisplay"
            (focus)="onFocus('distance')"
            (blur)="onBlur('distance')"
            (input)="onDistanceInput()"
          />
        </div>

        <div class="field-card">
          <label class="field-label">{{ 'DIALOGS.PACE_TIME' | translate }}</label>
          <input
            class="field-input"
            type="text"
            inputmode="numeric"
            placeholder="00:00:00"
            [value]="timeDisplay"
            (focus)="onFocus('time')"
            (blur)="onBlur('time')"
            (input)="onTimeInput($event)"
          />
        </div>

        <div class="field-card">
          <label class="field-label">{{ 'DIALOGS.PACE_PACE' | translate }}</label>
          <input
            class="field-input"
            type="text"
            inputmode="numeric"
            placeholder="00:00"
            [value]="paceDisplay"
            (focus)="onFocus('pace')"
            (blur)="onBlur('pace')"
            (input)="onPaceInput($event)"
          />
        </div>

        <div class="field-card">
          <label class="field-label">{{ 'DIALOGS.PACE_SPEED' | translate }}</label>
          <input
            class="field-input"
            type="text"
            inputmode="decimal"
            placeholder="0.0"
            [(ngModel)]="speedDisplay"
            (focus)="onFocus('speed')"
            (blur)="onBlur('speed')"
            (input)="onSpeedInput()"
          />
        </div>
      </div>

      <button class="reset-btn" (click)="reset()">{{ 'DIALOGS.PACE_RESET' | translate }}</button>

      <!-- Projected splits -->
      <div class="splits-section" *ngIf="splits.length > 0">
        <div class="splits-header">
          <h3>{{ 'DIALOGS.PACE_SPLITS' | translate }}</h3>
        </div>
        <div class="splits-grid">
          <div class="split-card" *ngFor="let split of splits">
            <span class="split-label">{{ split.label }}</span>
            <span class="split-time">{{ split.timeFormatted }}</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</dialog>
