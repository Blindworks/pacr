<dialog #dialog class="pace-dialog" (click)="onBackdropClick($event)">
  <div class="pace-inner" (click)="$event.stopPropagation()">

    <header class="pace-header">
      <div class="pace-header-title">
        <span class="material-symbols-outlined pace-icon">speed</span>
        <span>Pace Calculator</span>
      </div>
      <button class="pace-close" (click)="close()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <div class="pace-body">

      <div class="pace-intro">
        <h2>Run Smarter.</h2>
        <p>Enter any two values to calculate your performance metrics. <span class="pace-highlight">Values update live as you type.</span></p>
      </div>

      <!-- Race presets -->
      <div class="presets-section">
        <span class="presets-label">RACE PRESETS</span>
        <div class="presets">
          <button class="preset-btn" (click)="setPreset(5)">5K</button>
          <button class="preset-btn" (click)="setPreset(10)">10K</button>
          <button class="preset-btn" (click)="setPreset(21.0975)">Half Marathon</button>
          <button class="preset-btn" (click)="setPreset(42.195)">Full Marathon</button>
        </div>
      </div>

      <!-- Input fields -->
      <div class="fields-grid">
        <div class="field-card">
          <label class="field-label">DISTANCE (KM)</label>
          <input
            class="field-input"
            type="text"
            inputmode="decimal"
            placeholder="00.00"
            [(ngModel)]="distanceDisplay"
            (focus)="onFocus('distance')"
            (blur)="onBlur('distance')"
            (input)="onDistanceInput()"
          />
        </div>

        <div class="field-card">
          <label class="field-label">TIME (HH:MM:SS)</label>
          <input
            class="field-input"
            type="text"
            inputmode="numeric"
            placeholder="00:00:00"
            [value]="timeDisplay"
            (focus)="onFocus('time')"
            (blur)="onBlur('time')"
            (input)="onTimeInput($event)"
          />
        </div>

        <div class="field-card">
          <label class="field-label">PACE (MIN/KM)</label>
          <input
            class="field-input"
            type="text"
            inputmode="numeric"
            placeholder="00:00"
            [value]="paceDisplay"
            (focus)="onFocus('pace')"
            (blur)="onBlur('pace')"
            (input)="onPaceInput($event)"
          />
        </div>

        <div class="field-card">
          <label class="field-label">SPEED (KM/H)</label>
          <input
            class="field-input"
            type="text"
            inputmode="decimal"
            placeholder="0.0"
            [(ngModel)]="speedDisplay"
            (focus)="onFocus('speed')"
            (blur)="onBlur('speed')"
            (input)="onSpeedInput()"
          />
        </div>
      </div>

      <button class="reset-btn" (click)="reset()">Reset All Fields</button>

      <!-- Projected splits -->
      <div class="splits-section" *ngIf="splits.length > 0">
        <div class="splits-header">
          <h3>Projected Split Times</h3>
        </div>
        <div class="splits-grid">
          <div class="split-card" *ngFor="let split of splits">
            <span class="split-label">{{ split.label }}</span>
            <span class="split-time">{{ split.timeFormatted }}</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</dialog>
